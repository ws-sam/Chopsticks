name: Gitleaks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Required to post annotations on PRs
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Fetch full history so gitleaks can scan all commits in a PR
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE || '7C897F-20022D-E3EC39-74B5DF-A79E83-V3' }}
