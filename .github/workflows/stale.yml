name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,in-progress"
          exempt-pr-labels: "pinned,security,in-progress"
          stale-issue-message: >
            This issue has been inactive for 30 days. It will be closed in 7 days unless
            there's activity. Comment to keep it open, or add `in-progress` label if work
            is underway.
          stale-pr-message: >
            This PR has been inactive for 30 days. It will be closed in 7 days unless
            there's activity. Push a commit or comment to keep it open.
          close-issue-message: Closing due to inactivity. Reopen if this is still relevant.
          close-pr-message: Closing due to inactivity. Reopen if you'd like to continue this work.
